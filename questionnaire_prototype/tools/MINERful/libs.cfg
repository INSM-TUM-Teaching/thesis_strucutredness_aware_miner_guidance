# Classpath of MINERful's bundled third-party libraries.
#
# Sourced by the run-MINERful*.sh launchers (which run with this directory as
# their working directory) to populate $LIBS, appended after MINERful.jar on the
# java -cp path. The upstream distribution ships this file as a hand-maintained
# list; it is regenerated here from every jar under lib/ so it stays in sync with
# whatever the vendored lib/ actually contains.
LIBS="$(find lib -name '*.jar' | sort | tr '\n' ':')"
